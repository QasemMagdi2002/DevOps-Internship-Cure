apiVersion: apps/v1
kind: Deployment
metadata:
  name: cure-backend
  namespace: cure
  labels:
    app.kubernetes.io/name: cure-backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: cure-platform
    app.kubernetes.io/version: "v1"
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: cure-backend
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cure-backend
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: cure-platform
        app.kubernetes.io/version: "v1"
    spec:
      serviceAccountName: cure-backend-sa
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: qasem2002/cure-backend:v1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cure-backend-config
            - secretRef:
                name: cure-backend-secret
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cure-backend
  namespace: cure
  labels:
    app.kubernetes.io/name: cure-backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: cure-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cure-backend
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP