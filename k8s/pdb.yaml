apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cure-backend-pdb
  namespace: cure
  labels:
    app.kubernetes.io/name: cure-backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: cure-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cure-backend
      app.kubernetes.io/component: api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cure-frontend-pdb
  namespace: cure
  labels:
    app.kubernetes.io/name: cure-frontend
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: cure-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cure-frontend
      app.kubernetes.io/component: web