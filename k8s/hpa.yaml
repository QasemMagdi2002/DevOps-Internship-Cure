apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cure-backend-hpa
  namespace: cure
  labels:
    app.kubernetes.io/name: cure-backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: cure-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cure-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cure-frontend-hpa
  namespace: cure
  labels:
    app.kubernetes.io/name: cure-frontend
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: cure-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cure-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70