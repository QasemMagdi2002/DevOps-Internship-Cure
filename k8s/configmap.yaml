apiVersion: v1
kind: ConfigMap
metadata:
  name: cure-backend-config
  namespace: cure
  labels:
    app.kubernetes.io/name: cure-backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: cure-platform
data:
  APP_ENV: "production"
  APP_NAME: "CURE Patient Portal API"
  API_VERSION: "1.0.0"
  DB_AUTO_CREATE: "false"

  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"

  CORS_ORIGINS: "https://app.example.com"

  AWS_REGION: "eu-central-1"
  S3_BUCKET_NAME: "replace-with-terraform-s3-bucket-name"
  MAX_UPLOAD_SIZE_MB: "5"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cure-frontend-config
  namespace: cure
  labels:
    app.kubernetes.io/name: cure-frontend
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: cure-platform
data:
  APP_ENV: "production"